<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" th:replace="~{fragments/layout :: layout('Leitos', 'leitos', ~{::main})}">
<body>
    <main>
        <div class="d-flex justify-content-between align-items-center mb-4">
            <h1 class="h2">Leitos</h1>
        </div>
        <div class="card shadow-sm">
            <div class="card-body">
                <table class="table table-striped table-hover mb-0">
                    <thead class="table-dark">
                        <tr>
                            <th>Número</th>
                            <th>Quarto</th>
                            <th>Ala</th>
                            <th>Status</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr th:each="leito : ${leitos}">
                            <td th:text="${leito.numero}">-</td>
                            <td th:text="${leito.quarto?.numero}">-</td>
                            <td th:text="${leito.quarto?.ala?.nome}">-</td>
                            <td>
                                <span class="badge bg-success">Disponível</span>
                            </td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </main>
</body>
</html>
