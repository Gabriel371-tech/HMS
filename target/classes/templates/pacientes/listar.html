<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" th:replace="~{fragments/layout :: layout('Pacientes', 'pacientes', ~{::main})}">
<body>
    <main>
        <div class="d-flex justify-content-between align-items-center mb-4">
            <h1 class="h2">Pacientes</h1>
            <a th:href="@{/dashboard/pacientes/novo}" class="btn btn-primary">
                <i class="bi bi-plus-circle me-1"></i> Novo Paciente
            </a>
        </div>
        <div class="card shadow-sm">
            <div class="card-body">
                <table class="table table-striped table-hover mb-0">
                    <thead class="table-dark">
                        <tr>
                            <th>CPF</th>
                            <th>Nome</th>
                            <th>Data Nascimento</th>
                            <th>Tipo Sanguíneo</th>
                            <th>Ações</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr th:each="paciente : ${pacientes}">
                            <td th:text="${paciente.cpf}">-</td>
                            <td th:text="${paciente.nome}">-</td>
                            <td th:text="${#temporals.format(paciente.dataNascimento, 'dd/MM/yyyy')}">-</td>
                            <td th:text="${paciente.tipoSanguineo?.tipo + ' ' + paciente.tipoSanguineo?.fatorrh}">-</td>
                            <td>
                                <a th:href="@{/dashboard/pacientes/editar/{id}(id=${paciente.codpaciente})}" class="btn btn-sm btn-warning">
                                    <i class="bi bi-pencil"></i>
                                </a>
                                <a th:href="@{/dashboard/pacientes/excluir/{id}(id=${paciente.codpaciente})}" class="btn btn-sm btn-danger" onclick="return confirm('Tem certeza?')">
                                    <i class="bi bi-trash"></i>
                                </a>
                            </td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </main>
</body>
</html>
