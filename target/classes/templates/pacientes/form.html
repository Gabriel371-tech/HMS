<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" th:replace="~{fragments/layout :: layout(${paciente.codpaciente == null ? 'Novo Paciente' : 'Editar Paciente'}, 'pacientes', ~{::main})}">
<body>
    <main>
        <div class="mb-4">
            <h1 class="h2" th:text="${paciente.codpaciente == null ? 'Novo Paciente' : 'Editar Paciente'}">Novo Paciente</h1>
        </div>
        <div class="card shadow-sm">
            <div class="card-body">
                <form th:action="@{/dashboard/pacientes/salvar}" th:object="${paciente}" method="post">
                    <input type="hidden" th:field="*{codpaciente}">
                    <div class="row mb-3">
                        <div class="col-md-6">
                            <label for="nome" class="form-label">Nome Completo</label>
                            <input type="text" th:field="*{nome}" class="form-control" id="nome" required>
                        </div>
                        <div class="col-md-6">
                            <label for="cpf" class="form-label">CPF</label>
                            <input type="text" th:field="*{cpf}" class="form-control" id="cpf" required>
                        </div>
                    </div>
                    <div class="row mb-3">
                        <div class="col-md-6">
                            <label for="dataNascimento" class="form-label">Data de Nascimento</label>
                            <input type="date" th:field="*{dataNascimento}" class="form-control" id="dataNascimento" required>
                        </div>
                        <div class="col-md-6">
                            <label for="tipoSanguineo" class="form-label">Tipo Sanguíneo</label>
                            <select th:field="*{tipoSanguineo}" class="form-select" id="tipoSanguineo" required>
                                <option value="">Selecione...</option>
                                <option th:each="tipo : ${tiposSanguineos}" th:value="${tipo.codtipo}" th:text="${tipo.tipo + ' ' + tipo.fatorrh}"></option>
                            </select>
                        </div>
                    </div>
                    <div class="mt-4">
                        <button type="submit" class="btn btn-primary">
                            <i class="bi bi-save me-1"></i> Salvar
                        </button>
                        <a th:href="@{/dashboard/pacientes}" class="btn btn-secondary">
                            <i class="bi bi-x-circle me-1"></i> Cancelar
                        </a>
                    </div>
                </form>
            </div>
        </div>
    </main>
</body>
</html>
