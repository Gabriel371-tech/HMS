<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>HMS - Novo Médico</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        .sidebar { min-height: 100vh; background-color: #343a40; padding: 20px; color: #fff; }
        .sidebar a { color: #fff; text-decoration: none; display: block; padding: 10px; }
        .sidebar a:hover { background-color: #495057; border-radius: 5px; }
        .content { padding: 20px; }
    </style>
</head>
<body>
    <div class="container-fluid">
        <div class="row">
            <nav class="col-md-3 col-lg-2 d-md-block sidebar">
                <h3>HMS Admin</h3>
                <hr>
                <a th:href="@{/dashboard}">Dashboard</a>
                <a th:href="@{/dashboard/medicos}">Médicos</a>
                <a th:href="@{/dashboard/pacientes}">Pacientes</a>
                <a th:href="@{/dashboard/leitos}">Leitos</a>
                <hr>
                <a th:href="@{/logout}" class="text-danger">Sair</a>
            </nav>
            <main class="col-md-9 ms-sm-auto col-lg-10 content">
                <div class="pt-3 pb-2 mb-3 border-bottom">
                    <h1 class="h2">Novo Médico</h1>
                </div>
                <div class="card shadow-sm">
                    <div class="card-body">
                        <form th:action="@{/dashboard/medicos/salvar}" th:object="${medico}" method="post">
                            <input type="hidden" th:field="*{codmedico}">
                            <div class="row mb-3">
                                <div class="col-md-6">
                                    <label for="nome" class="form-label">Nome</label>
                                    <input type="text" th:field="*{nome}" class="form-control" id="nome" required>
                                </div>
                                <div class="col-md-6">
                                    <label for="crm" class="form-label">CRM</label>
                                    <input type="text" th:field="*{crm}" class="form-control" id="crm" required>
                                </div>
                            </div>
                            <div class="row mb-3">
                                <div class="col-md-6">
                                    <label for="especialidade" class="form-label">Especialidade</label>
                                    <select th:field="*{especialidade}" class="form-select" id="especialidade" required>
                                        <option value="">Selecione...</option>
                                        <option th:each="esp : ${especialidades}" th:value="${esp.codespecialidade}" th:text="${esp.nome}"></option>
                                    </select>
                                </div>
                                <div class="col-md-6">
                                    <label for="telefone" class="form-label">Telefone</label>
                                    <input type="text" th:field="*{telefone}" class="form-control" id="telefone">
                                </div>
                            </div>
                            <div class="mt-4">
                                <button type="submit" class="btn btn-success">Salvar</button>
                                <a th:href="@{/dashboard/medicos}" class="btn btn-secondary">Cancelar</a>
                            </div>
                        </form>
                    </div>
                </div>
            </main>
        </div>
    </div>
</body>
</html>
