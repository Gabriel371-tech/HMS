<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" th:replace="~{fragments/layout :: layout(${medico.codmedico == null ? 'Novo Médico' : 'Editar Médico'}, 'medicos', ~{::main})}">
<body>
    <main>
        <div class="mb-4">
            <h1 class="h2" th:text="${medico.codmedico == null ? 'Novo Médico' : 'Editar Médico'}">Novo Médico</h1>
        </div>
        <div class="card shadow-sm">
            <div class="card-body">
                <form th:action="@{/dashboard/medicos/salvar}" th:object="${medico}" method="post">
                    <input type="hidden" th:field="*{codmedico}">
                    <div class="row mb-3">
                        <div class="col-md-6">
                            <label for="nome" class="form-label">Nome</label>
                            <input type="text" th:field="*{nome}" class="form-control" id="nome" required>
                        </div>
                        <div class="col-md-6">
                            <label for="crm" class="form-label">CRM</label>
                            <input type="text" th:field="*{crm}" class="form-control" id="crm" required>
                        </div>
                    </div>
                    <div class="row mb-3">
                        <div class="col-md-6">
                            <label for="especialidade" class="form-label">Especialidade</label>
                            <select th:field="*{especialidade}" class="form-select" id="especialidade" required>
                                <option value="">Selecione...</option>
                                <option th:each="esp : ${especialidades}" th:value="${esp.codespecialidade}" th:text="${esp.nome}"></option>
                            </select>
                        </div>
                        <div class="col-md-6">
                            <label for="telefone" class="form-label">Telefone</label>
                            <input type="text" th:field="*{telefone}" class="form-control" id="telefone">
                        </div>
                    </div>
                    <div class="mt-4">
                        <button type="submit" class="btn btn-primary">
                            <i class="bi bi-save me-1"></i> Salvar
                        </button>
                        <a th:href="@{/dashboard/medicos}" class="btn btn-secondary">
                            <i class="bi bi-x-circle me-1"></i> Cancelar
                        </a>
                    </div>
                </form>
            </div>
        </div>
    </main>
</body>
</html>
