<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>HMS - Novo Quarto</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        .sidebar { min-height: 100vh; background-color: #343a40; padding: 20px; color: #fff; }
        .sidebar a { color: #fff; text-decoration: none; display: block; padding: 10px; }
        .sidebar a:hover { background-color: #495057; border-radius: 5px; }
        .content { padding: 20px; }
    </style>
</head>
<body>
    <div class="container-fluid">
        <div class="row">
            <nav class="col-md-3 col-lg-2 d-md-block sidebar">
                <h3>HMS Admin</h3>
                <hr>
                <a th:href="@{/dashboard}">Dashboard</a>
                <a th:href="@{/dashboard/medicos}">Médicos</a>
                <a th:href="@{/dashboard/pacientes}">Pacientes</a>
                <a th:href="@{/dashboard/leitos}">Leitos</a>
                <a th:href="@{/dashboard/alas}">Alas</a>
                <a th:href="@{/dashboard/quartos}">Quartos</a>
                <a th:href="@{/dashboard/especialidades}">Especialidades</a>
                <hr>
                <a th:href="@{/logout}" class="text-danger">Sair</a>
            </nav>
            <main class="col-md-9 ms-sm-auto col-lg-10 content">
                <div class="pt-3 pb-2 mb-3 border-bottom">
                    <h1 class="h2">Novo Quarto</h1>
                </div>
                <div class="card shadow-sm">
                    <div class="card-body">
                        <form th:action="@{/dashboard/quartos/salvar}" th:object="${quarto}" method="post">
                            <input type="hidden" th:field="*{codquarto}">
                            <div class="mb-3">
                                <label for="numero" class="form-label">Número do Quarto</label>
                                <input type="number" th:field="*{numero}" class="form-control" id="numero" required>
                            </div>
                            <div class="mb-3">
                                <label for="tipo" class="form-label">Tipo de Quarto</label>
                                <input type="text" th:field="*{tipo}" class="form-control" id="tipo" placeholder="Ex: Particular, Semi-privativo, Enfermaria">
                            </div>
                            <div class="mb-3">
                                <label for="ala" class="form-label">Ala</label>
                                <select th:field="*{ala}" class="form-select" id="ala" required>
                                    <option value="">Selecione...</option>
                                    <option th:each="a : ${alas}" th:value="${a.codala}" th:text="${a.nome}"></option>
                                </select>
                            </div>
                            <div class="mt-4">
                                <button type="submit" class="btn btn-success">Salvar</button>
                                <a th:href="@{/dashboard/quartos}" class="btn btn-secondary">Cancelar</a>
                            </div>
                        </form>
                    </div>
                </div>
            </main>
        </div>
    </div>
</body>
</html>
