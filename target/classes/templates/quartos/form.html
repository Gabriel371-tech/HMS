<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" th:replace="~{fragments/layout :: layout(${quarto.codquarto == null ? 'Novo Quarto' : 'Editar Quarto'}, 'quartos', ~{::main})}">
<body>
    <main>
        <div class="mb-4">
            <h1 class="h2" th:text="${quarto.codquarto == null ? 'Novo Quarto' : 'Editar Quarto'}">Novo Quarto</h1>
        </div>
        <div class="card shadow-sm">
            <div class="card-body">
                <form th:action="@{/dashboard/quartos/salvar}" th:object="${quarto}" method="post">
                    <input type="hidden" th:field="*{codquarto}">
                    <div class="mb-3">
                        <label for="numero" class="form-label">Número do Quarto</label>
                        <input type="number" th:field="*{numero}" class="form-control" id="numero" required>
                    </div>
                    <div class="mb-3">
                        <label for="tipo" class="form-label">Tipo de Quarto</label>
                        <input type="text" th:field="*{tipo}" class="form-control" id="tipo" placeholder="Ex: Particular, Semi-privativo, Enfermaria">
                    </div>
                    <div class="mb-3">
                        <label for="ala" class="form-label">Ala</label>
                        <select th:field="*{ala}" class="form-select" id="ala" required>
                            <option value="">Selecione...</option>
                            <option th:each="a : ${alas}" th:value="${a.codala}" th:text="${a.nome}"></option>
                        </select>
                    </div>
                    <div class="mt-4">
                        <button type="submit" class="btn btn-primary">
                            <i class="bi bi-save me-1"></i> Salvar
                        </button>
                        <a th:href="@{/dashboard/quartos}" class="btn btn-secondary">
                            <i class="bi bi-x-circle me-1"></i> Cancelar
                        </a>
                    </div>
                </form>
            </div>
        </div>
    </main>
</body>
</html>
