<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" th:replace="~{fragments/layout :: layout(${especialidade.codespecialidade == null ? 'Nova Especialidade' : 'Editar Especialidade'}, 'especialidades', ~{::main})}">
<body>
    <main>
        <div class="mb-4">
            <h1 class="h2" th:text="${especialidade.codespecialidade == null ? 'Nova Especialidade' : 'Editar Especialidade'}">Nova Especialidade</h1>
        </div>
        <div class="card shadow-sm">
            <div class="card-body">
                <form th:action="@{/dashboard/especialidades/salvar}" th:object="${especialidade}" method="post">
                    <input type="hidden" th:field="*{codespecialidade}">
                    <div class="mb-3">
                        <label for="nome" class="form-label">Nome da Especialidade</label>
                        <input type="text" th:field="*{nome}" class="form-control" id="nome" required>
                    </div>
                    <div class="mb-3">
                        <label for="descricao" class="form-label">Descrição</label>
                        <textarea th:field="*{descricao}" class="form-control" id="descricao" rows="3"></textarea>
                    </div>
                    <div class="mt-4">
                        <button type="submit" class="btn btn-primary">
                            <i class="bi bi-save me-1"></i> Salvar
                        </button>
                        <a th:href="@{/dashboard/especialidades}" class="btn btn-secondary">
                            <i class="bi bi-x-circle me-1"></i> Cancelar
                        </a>
                    </div>
                </form>
            </div>
        </div>
    </main>
</body>
</html>
