<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" th:replace="~{fragments/layout :: layout(${ala.codala == null ? 'Nova Ala' : 'Editar Ala'}, 'alas', ~{::main})}">
<body>
    <main>
        <div class="mb-4">
            <h1 class="h2" th:text="${ala.codala == null ? 'Nova Ala' : 'Editar Ala'}">Nova Ala</h1>
        </div>
        <div class="card shadow-sm">
            <div class="card-body">
                <form th:action="@{/dashboard/alas/salvar}" th:object="${ala}" method="post">
                    <input type="hidden" th:field="*{codala}">
                    <div class="mb-3">
                        <label for="nome" class="form-label">Nome da Ala</label>
                        <input type="text" th:field="*{nome}" class="form-control" id="nome" required>
                    </div>
                    <div class="mb-3">
                        <label for="andar" class="form-label">Andar</label>
                        <input type="number" th:field="*{andar}" class="form-control" id="andar">
                    </div>
                    <div class="mt-4">
                        <button type="submit" class="btn btn-primary">
                            <i class="bi bi-save me-1"></i> Salvar
                        </button>
                        <a th:href="@{/dashboard/alas}" class="btn btn-secondary">
                            <i class="bi bi-x-circle me-1"></i> Cancelar
                        </a>
                    </div>
                </form>
            </div>
        </div>
    </main>
</body>
</html>
