<!DOCTYPE html>
<html lang="pt-BR" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HMS - Alas</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@600;700;800&family=Source+Sans+3:wght@400;600;700&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <link rel="stylesheet" th:href="@{/css/hms-theme.css}">
</head>
<body class="admin-page">
    <div class="container-fluid admin-shell">
        <div class="row g-0">
            <nav class="col-lg-3 col-xl-2 sidebar">
                <div class="sidebar-header">
                    <img th:src="@{/images/logo.png}" alt="Logo HMS" class="brand-logo-image">
                    <div class="sidebar-brand-copy">
                        <span class="fw-bold fs-5">HMS Admin</span>
                        <small>Painel hospitalar</small>
                    </div>
                </div>
                <div class="sidebar-section">Operacao</div>
                <a th:href="@{/dashboard}"><i class="bi bi-grid-1x2-fill"></i><span>Dashboard</span></a>
                <a th:href="@{/dashboard/medicos}"><i class="bi bi-person-badge"></i><span>Medicos</span></a>
                <a th:href="@{/dashboard/pacientes}"><i class="bi bi-people"></i><span>Pacientes</span></a>
                <a th:href="@{/dashboard/leitos}"><i class="bi bi-hospital"></i><span>Leitos</span></a>
                <a th:href="@{/dashboard/alas}" class="active"><i class="bi bi-building"></i><span>Alas</span></a>
                <a th:href="@{/dashboard/quartos}"><i class="bi bi-door-open"></i><span>Quartos</span></a>
                <a th:href="@{/dashboard/especialidades}"><i class="bi bi-clipboard2-pulse"></i><span>Especialidades</span></a>
            </nav>
            <main class="col-lg-9 col-xl-10 content">
                <div class="page-toolbar">
                    <div>
                        <h1 class="h2 fw-bold mb-1">Alas</h1>
                        <p class="text-muted mb-0">Organizacao setorial com identidade visual alinhada ao restante do sistema.</p>
                    </div>
                    <div class="toolbar-actions">
                        <a th:href="@{/dashboard/alas/novo}" class="btn btn-primary">Nova ala</a>
                        <div class="dropdown">
                            <div class="user-profile dropdown-toggle" data-bs-toggle="dropdown" aria-expanded="false">
                                <div class="d-none d-md-block text-end">
                                    <div class="fw-bold small" th:text="${session.usuarioLogado != null ? session.usuarioLogado.nome : 'Usuario'}">Usuario</div>
                                    <div class="text-muted" style="font-size: 0.78rem;">Administrador</div>
                                </div>
                                <div class="user-icon">
                                    <i class="bi bi-person-fill"></i>
                                </div>
                            </div>
                            <ul class="dropdown-menu dropdown-menu-end shadow border-0">
                                <li><a class="dropdown-item py-2" href="#"><i class="bi bi-person me-2"></i>Perfil</a></li>
                                <li><a class="dropdown-item py-2" href="#"><i class="bi bi-gear me-2"></i>Configuracoes</a></li>
                                <li><hr class="dropdown-divider"></li>
                                <li><a class="dropdown-item py-2 text-danger" th:href="@{/logout}"><i class="bi bi-box-arrow-right me-2"></i>Sair</a></li>
                            </ul>
                        </div>
                    </div>
                </div>
                <div class="page-card table-shell">
                    <table class="table table-hover align-middle">
                        <thead>
                            <tr>
                                <th>Nome</th>
                                <th>Andar</th>
                                <th class="text-end">Acoes</th>
                            </tr>
                        </thead>
                        <tbody>
                            <tr th:each="ala : ${alas}">
                                <td th:text="${ala.nome}">-</td>
                                <td th:text="${ala.andar}">-</td>
                                <td class="text-end">
                                    <a th:href="@{/dashboard/alas/editar/{id}(id=${ala.codala})}" class="btn btn-sm btn-warning">Editar</a>
                                    <a th:href="@{/dashboard/alas/excluir/{id}(id=${ala.codala})}" class="btn btn-sm btn-danger" onclick="return confirm('Tem certeza?')">Excluir</a>
                                </td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </main>
        </div>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
