<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" th:replace="~{fragments/layout :: layout('Alas', 'alas', ~{::main})}">
<body>
    <main>
        <div class="d-flex justify-content-between align-items-center mb-4">
            <h1 class="h2">Alas</h1>
            <a th:href="@{/dashboard/alas/novo}" class="btn btn-primary">
                <i class="bi bi-plus-circle me-1"></i> Nova Ala
            </a>
        </div>
        <div class="card shadow-sm">
            <div class="card-body">
                <table class="table table-striped table-hover mb-0">
                    <thead class="table-dark">
                        <tr>
                            <th>Nome</th>
                            <th>Andar</th>
                            <th>Ações</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr th:each="ala : ${alas}">
                            <td th:text="${ala.nome}">-</td>
                            <td th:text="${ala.andar}">-</td>
                            <td>
                                <a th:href="@{/dashboard/alas/editar/{id}(id=${ala.codala})}" class="btn btn-sm btn-warning">
                                    <i class="bi bi-pencil"></i>
                                </a>
                                <a th:href="@{/dashboard/alas/excluir/{id}(id=${ala.codala})}" class="btn btn-sm btn-danger" onclick="return confirm('Tem certeza?')">
                                    <i class="bi bi-trash"></i>
                                </a>
                            </td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </main>
</body>
</html>
