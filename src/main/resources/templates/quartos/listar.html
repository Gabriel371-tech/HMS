<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" th:replace="~{fragments/layout :: layout('Quartos', 'quartos', ~{::main})}">
<body>
    <main>
        <div class="d-flex justify-content-between align-items-center mb-4">
            <h1 class="h2">Quartos</h1>
            <a th:href="@{/dashboard/quartos/novo}" class="btn btn-primary">
                <i class="bi bi-plus-circle me-1"></i> Novo Quarto
            </a>
        </div>
        <div class="card shadow-sm">
            <div class="card-body">
                <table class="table table-striped table-hover mb-0">
                    <thead class="table-dark">
                        <tr>
                            <th>Número</th>
                            <th>Tipo</th>
                            <th>Ala</th>
                            <th>Ações</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr th:each="quarto : ${quartos}">
                            <td th:text="${quarto.numero}">-</td>
                            <td th:text="${quarto.tipo}">-</td>
                            <td th:text="${quarto.ala?.nome}">-</td>
                            <td>
                                <a th:href="@{/dashboard/quartos/editar/{id}(id=${quarto.codquarto})}" class="btn btn-sm btn-warning">
                                    <i class="bi bi-pencil"></i>
                                </a>
                                <a th:href="@{/dashboard/quartos/excluir/{id}(id=${quarto.codquarto})}" class="btn btn-sm btn-danger" onclick="return confirm('Tem certeza?')">
                                    <i class="bi bi-trash"></i>
                                </a>
                            </td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </main>
</body>
</html>
