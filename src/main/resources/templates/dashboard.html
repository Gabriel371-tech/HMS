<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>HMS - Dashboard</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        .sidebar { min-height: 100vh; background-color: #343a40; padding: 20px; color: #fff; }
        .sidebar a { color: #fff; text-decoration: none; display: block; padding: 10px; }
        .sidebar a:hover { background-color: #495057; border-radius: 5px; }
        .content { padding: 20px; }
    </style>
</head>
<body>
    <div class="container-fluid">
        <div class="row">
            <nav class="col-md-3 col-lg-2 d-md-block sidebar">
                <h3>HMS Admin</h3>
                <hr>
                <a th:href="@{/dashboard}">Dashboard</a>
                <a th:href="@{/dashboard/medicos}">Médicos</a>
                <a th:href="@{/dashboard/pacientes}">Pacientes</a>
                <a th:href="@{/dashboard/leitos}">Leitos</a>
                <hr>
                <a th:href="@{/logout}" class="text-danger">Sair</a>
            </nav>
            <main class="col-md-9 ms-sm-auto col-lg-10 content">
                <div class="d-flex justify-content-between flex-wrap flex-md-nowrap align-items-center pt-3 pb-2 mb-3 border-bottom">
                    <h1 class="h2">Dashboard Overview</h1>
                    <div th:if="${session.usuarioLogado}">
                        Bem-vindo, <span th:text="${session.usuarioLogado.nome}">Usuário</span>!
                    </div>
                </div>
                <div class="row">
                    <div class="col-md-4">
                        <div class="card text-white bg-primary mb-3">
                            <div class="card-body">
                                <h5 class="card-title">Médicos Cadastrados</h5>
                                <p class="card-text h3" th:text="${totalMedicos}">0</p>
                                <a th:href="@{/dashboard/medicos}" class="btn btn-sm btn-light">Ver Lista</a>
                            </div>
                        </div>
                    </div>
                    <div class="col-md-4">
                        <div class="card text-white bg-success mb-3">
                            <div class="card-body">
                                <h5 class="card-title">Pacientes Registrados</h5>
                                <p class="card-text h3" th:text="${totalPacientes}">0</p>
                                <a th:href="@{/dashboard/pacientes}" class="btn btn-sm btn-light">Ver Lista</a>
                            </div>
                        </div>
                    </div>
                    <div class="col-md-4">
                        <div class="card text-white bg-info mb-3">
                            <div class="card-body">
                                <h5 class="card-title">Leitos Totais</h5>
                                <p class="card-text h3" th:text="${totalLeitos}">0</p>
                                <a th:href="@{/dashboard/leitos}" class="btn btn-sm btn-light">Ver Detalhes</a>
                            </div>
                        </div>
                    </div>
                </div>
            </main>
        </div>
    </div>
</body>
</html>
