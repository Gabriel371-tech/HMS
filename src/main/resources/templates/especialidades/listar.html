<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>HMS - Especialidades</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        .sidebar { min-height: 100vh; background-color: #343a40; padding: 20px; color: #fff; }
        .sidebar a { color: #fff; text-decoration: none; display: block; padding: 10px; }
        .sidebar a:hover { background-color: #495057; border-radius: 5px; }
        .content { padding: 20px; }
    </style>
</head>
<body>
    <div class="container-fluid">
        <div class="row">
            <nav class="col-md-3 col-lg-2 d-md-block sidebar">
                <h3>HMS Admin</h3>
                <hr>
                <a th:href="@{/dashboard}">Dashboard</a>
                <a th:href="@{/dashboard/medicos}">Médicos</a>
                <a th:href="@{/dashboard/pacientes}">Pacientes</a>
                <a th:href="@{/dashboard/leitos}">Leitos</a>
                <a th:href="@{/dashboard/alas}">Alas</a>
                <a th:href="@{/dashboard/quartos}">Quartos</a>
                <a th:href="@{/dashboard/especialidades}">Especialidades</a>
                <hr>
                <a th:href="@{/logout}" class="text-danger">Sair</a>
            </nav>
            <main class="col-md-9 ms-sm-auto col-lg-10 content">
                <div class="d-flex justify-content-between align-items-center pt-3 pb-2 mb-3 border-bottom">
                    <h1 class="h2">Especialidades</h1>
                    <a th:href="@{/dashboard/especialidades/novo}" class="btn btn-primary">Nova Especialidade</a>
                </div>
                <table class="table table-striped table-hover">
                    <thead class="table-dark">
                        <tr>
                            <th>Nome</th>
                            <th>Descrição</th>
                            <th>Ações</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr th:each="esp : ${especialidades}">
                            <td th:text="${esp.nome}">-</td>
                            <td th:text="${esp.descricao}">-</td>
                            <td>
                                <a th:href="@{/dashboard/especialidades/editar/{id}(id=${esp.codespecialidade})}" class="btn btn-sm btn-warning">Editar</a>
                                <a th:href="@{/dashboard/especialidades/excluir/{id}(id=${esp.codespecialidade})}" class="btn btn-sm btn-danger" onclick="return confirm('Tem certeza?')">Excluir</a>
                            </td>
                        </tr>
                    </tbody>
                </table>
            </main>
        </div>
    </div>
</body>
</html>
