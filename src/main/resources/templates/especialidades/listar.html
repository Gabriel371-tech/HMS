<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" th:replace="~{fragments/layout :: layout('Especialidades', 'especialidades', ~{::main})}">
<body>
    <main>
        <div class="d-flex justify-content-between align-items-center mb-4">
            <h1 class="h2">Especialidades</h1>
            <a th:href="@{/dashboard/especialidades/novo}" class="btn btn-primary">
                <i class="bi bi-plus-circle me-1"></i> Nova Especialidade
            </a>
        </div>
        <div class="card shadow-sm">
            <div class="card-body">
                <table class="table table-striped table-hover mb-0">
                    <thead class="table-dark">
                        <tr>
                            <th>Nome</th>
                            <th>Descrição</th>
                            <th>Ações</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr th:each="esp : ${especialidades}">
                            <td th:text="${esp.nome}">-</td>
                            <td th:text="${esp.descricao}">-</td>
                            <td>
                                <a th:href="@{/dashboard/especialidades/editar/{id}(id=${esp.codespecialidade})}" class="btn btn-sm btn-warning">
                                    <i class="bi bi-pencil"></i>
                                </a>
                                <a th:href="@{/dashboard/especialidades/excluir/{id}(id=${esp.codespecialidade})}" class="btn btn-sm btn-danger" onclick="return confirm('Tem certeza?')">
                                    <i class="bi bi-trash"></i>
                                </a>
                            </td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </main>
</body>
</html>
