<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" th:replace="~{fragments/layout :: layout('Médicos', 'medicos', ~{::main})}">
<body>
    <main>
        <div class="d-flex justify-content-between align-items-center mb-4">
            <h1 class="h2">Médicos</h1>
            <a th:href="@{/dashboard/medicos/novo}" class="btn btn-primary">
                <i class="bi bi-plus-circle me-1"></i> Novo Médico
            </a>
        </div>
        <div class="card shadow-sm">
            <div class="card-body">
                <table class="table table-striped table-hover mb-0">
                    <thead class="table-dark">
                        <tr>
                            <th>CRM</th>
                            <th>Nome</th>
                            <th>Especialidade</th>
                            <th>Telefone</th>
                            <th>Ações</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr th:each="medico : ${medicos}">
                            <td th:text="${medico.crm}">-</td>
                            <td th:text="${medico.nome}">-</td>
                            <td th:text="${medico.especialidade?.nome}">-</td>
                            <td th:text="${medico.telefone}">-</td>
                            <td>
                                <a th:href="@{/dashboard/medicos/editar/{id}(id=${medico.codmedico})}" class="btn btn-sm btn-warning">
                                    <i class="bi bi-pencil"></i>
                                </a>
                                <a th:href="@{/dashboard/medicos/excluir/{id}(id=${medico.codmedico})}" class="btn btn-sm btn-danger" onclick="return confirm('Tem certeza?')">
                                    <i class="bi bi-trash"></i>
                                </a>
                            </td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </main>
</body>
</html>
