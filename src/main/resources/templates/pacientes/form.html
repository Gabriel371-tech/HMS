<!DOCTYPE html>
<html lang="pt-BR" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HMS - Novo Paciente</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@600;700;800&family=Source+Sans+3:wght@400;600;700&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <link rel="stylesheet" th:href="@{/css/hms-theme.css}">
</head>
<body class="admin-page">
    <div class="container-fluid admin-shell">
        <div class="row g-0">
            <nav class="col-lg-3 col-xl-2 sidebar">
                <div class="sidebar-header">
                    <img th:src="@{/images/logo.png}" alt="Logo HMS" class="brand-logo-image">
                    <div class="sidebar-brand-copy">
                        <span class="fw-bold fs-5">HMS Admin</span>
                        <small>Painel hospitalar</small>
                    </div>
                </div>
                <div class="sidebar-section">Operacao</div>
                <a th:href="@{/dashboard}"><i class="bi bi-grid-1x2-fill"></i><span>Dashboard</span></a>
                <a th:href="@{/dashboard/medicos}"><i class="bi bi-person-badge"></i><span>Medicos</span></a>
                <a th:href="@{/dashboard/pacientes}" class="active"><i class="bi bi-people"></i><span>Pacientes</span></a>
                <a th:href="@{/dashboard/leitos}"><i class="bi bi-hospital"></i><span>Leitos</span></a>
                <a th:href="@{/dashboard/alas}"><i class="bi bi-building"></i><span>Alas</span></a>
                <a th:href="@{/dashboard/quartos}"><i class="bi bi-door-open"></i><span>Quartos</span></a>
                <a th:href="@{/dashboard/especialidades}"><i class="bi bi-clipboard2-pulse"></i><span>Especialidades</span></a>
            </nav>
            <main class="col-lg-9 col-xl-10 content">
                <div class="page-toolbar">
                    <div>
                        <h1 class="h2 fw-bold mb-1">Novo paciente</h1>
                        <p class="text-muted mb-0">Formulario com aparencia mais contemporanea e foco em leitura.</p>
                    </div>
                    <div class="toolbar-actions">
                        <div class="dropdown">
                            <div class="user-profile dropdown-toggle" data-bs-toggle="dropdown" aria-expanded="false">
                                <div class="d-none d-md-block text-end">
                                    <div class="fw-bold small" th:text="${session.usuarioLogado != null ? session.usuarioLogado.nome : 'Usuario'}">Usuario</div>
                                    <div class="text-muted" style="font-size: 0.78rem;">Administrador</div>
                                </div>
                                <div class="user-icon">
                                    <i class="bi bi-person-fill"></i>
                                </div>
                            </div>
                            <ul class="dropdown-menu dropdown-menu-end shadow border-0">
                                <li><a class="dropdown-item py-2" href="#"><i class="bi bi-person me-2"></i>Perfil</a></li>
                                <li><a class="dropdown-item py-2" href="#"><i class="bi bi-gear me-2"></i>Configuracoes</a></li>
                                <li><hr class="dropdown-divider"></li>
                                <li><a class="dropdown-item py-2 text-danger" th:href="@{/logout}"><i class="bi bi-box-arrow-right me-2"></i>Sair</a></li>
                            </ul>
                        </div>
                    </div>
                </div>
                <div class="page-card">
                    <form th:action="@{/dashboard/pacientes/salvar}" th:object="${paciente}" method="post">
                        <input type="hidden" th:field="*{codpaciente}">
                        <div class="row g-3">
                            <div class="col-md-6">
                                <label for="nome" class="form-label">Nome completo</label>
                                <input type="text" th:field="*{nome}" class="form-control" id="nome" required>
                            </div>
                            <div class="col-md-6">
                                <label for="cpf" class="form-label">CPF</label>
                                <input type="text" th:field="*{cpf}" class="form-control" id="cpf" required>
                            </div>
                            <div class="col-md-6">
                                <label for="dataNascimento" class="form-label">Data de nascimento</label>
                                <input type="date" th:field="*{dataNascimento}" class="form-control" id="dataNascimento" required>
                            </div>
                            <div class="col-md-6">
                                <label for="tipoSanguineo" class="form-label">Tipo sanguineo</label>
                                <select th:field="*{tipoSanguineo}" class="form-select" id="tipoSanguineo" required>
                                    <option value="">Selecione...</option>
                                    <option th:each="tipo : ${tiposSanguineos}" th:value="${tipo.codtipo}" th:text="${tipo.tipo + ' ' + tipo.fatorrh}"></option>
                                </select>
                            </div>
                        </div>
                        <div class="mt-4 d-flex gap-2">
                            <button type="submit" class="btn btn-success">Salvar</button>
                            <a th:href="@{/dashboard/pacientes}" class="btn btn-secondary">Cancelar</a>
                        </div>
                    </form>
                </div>
            </main>
        </div>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
