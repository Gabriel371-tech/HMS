<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Hospital Management System - HMS</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        .hero-section { background: linear-gradient(rgba(0,0,0,0.6), rgba(0,0,0,0.6)), url('https://images.unsplash.com/photo-1519494026892-80bbd2d6fd0d?ixlib=rb-1.2.1&auto=format&fit=crop&w=1350&q=80'); background-size: cover; height: 100vh; color: white; display: flex; align-items: center; justify-content: center; text-align: center; }
    </style>
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
        <div class="container">
            <a class="navbar-brand" href="#">HMS</a>
            <div class="d-flex">
                <a th:href="@{/login}" class="btn btn-outline-light me-2">Login</a>
                <a th:href="@{/cadastro}" class="btn btn-primary">Cadastrar</a>
            </div>
        </div>
    </nav>

    <header class="hero-section">
        <div class="container">
            <h1 class="display-3 fw-bold">Gestão Hospitalar Eficiente</h1>
            <p class="lead">Simplificando o cuidado com a saúde através de tecnologia moderna.</p>
            <div class="mt-4">
                <a th:href="@{/cadastro}" class="btn btn-primary btn-lg px-4 me-md-2">Começar Agora</a>
            </div>
        </div>
    </header>

    <section class="py-5">
        <div class="container text-center">
            <h2>Sobre o HMS</h2>
            <p class="lead text-muted">Uma plataforma completa para gestão de médicos, pacientes, alas e leitos.</p>
        </div>
    </section>
</body>
</html>
