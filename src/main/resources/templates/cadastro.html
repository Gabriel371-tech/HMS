<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>HMS - Cadastro</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #f4f7f6; display: flex; align-items: center; height: 100vh; }
        .register-form { width: 100%; max-width: 400px; padding: 15px; margin: auto; }
    </style>
</head>
<body>
    <main class="register-form text-center">
        <div class="mb-4">
            <img th:src="@{/images/logo.png}" alt="Logo HMS" height="60">
        </div>
        <a th:href="@{/}" class="mb-4 d-inline-block text-decoration-none h4 text-dark">← Voltar</a>
        <div class="card shadow-sm text-start">
            <div class="card-body">
                <h1 class="h3 mb-3 fw-normal text-center">Criar Nova Conta</h1>
                <form th:action="@{/cadastro}" th:object="${usuario}" method="post">
                    <div class="mb-3">
                        <label for="nome" class="form-label">Nome Completo</label>
                        <input type="text" th:field="*{nome}" class="form-control" id="nome" required>
                    </div>
                    <div class="mb-3">
                        <label for="username" class="form-label">Usuário (Username)</label>
                        <input type="text" th:field="*{username}" class="form-control" id="username" required>
                    </div>
                    <div class="mb-3">
                        <label for="password" class="form-label">Senha</label>
                        <input type="password" th:field="*{password}" class="form-control" id="password" required>
                    </div>
                    <button class="w-100 btn btn-lg btn-success" type="submit">Cadastrar</button>
                    <div class="mt-3 text-center">
                        Já tem uma conta? <a th:href="@{/login}">Entrar</a>
                    </div>
                </form>
            </div>
        </div>
    </main>
</body>
</html>
