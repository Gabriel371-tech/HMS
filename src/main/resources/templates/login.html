<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>HMS - Login</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #f4f7f6; display: flex; align-items: center; height: 100vh; }
        .login-form { width: 100%; max-width: 400px; padding: 15px; margin: auto; }
    </style>
</head>
<body>
    <main class="login-form text-center">
        <a th:href="@{/}" class="mb-4 d-inline-block text-decoration-none h4 text-dark">← Voltar</a>
        <div class="card shadow-sm text-start">
            <div class="card-body">
                <h1 class="h3 mb-3 fw-normal text-center">Entrar no HMS</h1>
                <form th:action="@{/login}" method="post">
                    <div th:if="${erro}" class="alert alert-danger" th:text="${erro}"></div>
                    <div class="mb-3">
                        <label for="username" class="form-label">Usuário</label>
                        <input type="text" name="username" class="form-control" id="username" required>
                    </div>
                    <div class="mb-3">
                        <label for="password" class="form-label">Senha</label>
                        <input type="password" name="password" class="form-control" id="password" required>
                    </div>
                    <button class="w-100 btn btn-lg btn-primary" type="submit">Entrar</button>
                    <div class="mt-3 text-center">
                        Não tem uma conta? <a th:href="@{/cadastro}">Cadastre-se</a>
                    </div>
                </form>
            </div>
        </div>
    </main>
</body>
</html>
